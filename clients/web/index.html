<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qatar Grocery Price Finder</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-xl"></div>

    <script type="text/babel" data-type="module" src="api.js"></script>

    <script type="text/babel" data-type="module" src="SearchBox.jsx"></script>

    <script type="text/babel" data-type="module">
        // Wait a split second for scripts to load into window memory, then mount
        window.addEventListener('DOMContentLoaded', () => {
            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                // Dynamically check if SearchBox is globally available
                if (typeof SearchBox !== 'undefined') {
                    root.render(React.createElement(SearchBox));
                } else {
                    document.getElementById('root').innerHTML = `
                        <div class="text-center p-6 bg-red-900/50 rounded-lg border border-red-500">
                            <h2 class="text-xl font-bold mb-2">Initialization Error</h2>
                            <p class="text-gray-300 text-sm">SearchBox component was not loaded correctly into global memory.</p>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Mounting error:", err);
            }
        });
    </script>
</body>
</html>
